name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: Management
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "1"
        ports:
          - 5432:5432
        # 🟢 Baza to'liq tayyor bo'lishini kutish (Xatolikni oldini oladi)
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip' # ⚡ Kutubxonalarni keshlab, pip installni tezlashtiradi

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        env:
          # GitHub Actions runner o'zida ishlayotgani uchun localhost qoladi
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: Management
          DB_USER: postgres
          DB_PASSWORD: "1"
          SECRET_KEY: test-key-123
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: python manage.py test clinicapp.tests
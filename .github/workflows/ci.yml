name: CI/CD Pipeline

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: Management
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "1"
        ports: [5432:5432]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        env:
          DB_HOST: localhost
          DB_NAME: Management
          DB_USER: postgres
          DB_PASSWORD: "1"
          SECRET_KEY: test-key-123
          IS_TESTING: True  # settings.py ga Redis'ni o'chir deb signal beradi
        run: python manage.py test clinicapp.tests
services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: Management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: redis_cache # settings.py dagi redis_cache nomiga mos
    restart: always

  web:
    build: .
    container_name: django_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data: